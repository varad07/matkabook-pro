version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       matkabook
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run only when the volume is empty (first start)
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d matkabook"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node / Express) ────────────────────────────────
  backend:
    build:
      context: .                  # root — needed so database/ is reachable
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     matkabook
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET:  ${JWT_SECRET:-matkabook_secret_key_2024}
      PORT:        5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  # ── Frontend (React → Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative URLs — Nginx proxies /api/* and /socket.io/* to backend
        VITE_API_URL:    /api
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
